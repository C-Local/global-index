<!-- Structure created with Google Stitch, modified and extended with custom logic -->

<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Global Index — search any country and explore its population, geography, memberships, languages, and neighbouring nations."
    />
    <title>Global Index</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!--
      Preconnect hints — tell the browser to open connections to Google's
      font servers before the actual font requests fire, reducing load time.
      fonts.googleapis.com serves the CSS; fonts.gstatic.com serves the files.
      crossorigin is required on the second one because font files are fetched
      from a different origin than the CSS.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Geist:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />

    <!--
  Tailwind config — must come AFTER the CDN script because this syntax
  assigns to the tailwind global object the CDN creates. Placing it before
  the CDN would throw a ReferenceError at runtime.
-->
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              error: "#ffb4ab",
              "secondary-fixed": "#ffe16d",
              primary: "#dbfcff",
              "tertiary-fixed-dim": "#2ae500",
              "surface-dim": "#0f131f",
              outline: "#849495",
              "on-surface": "#dfe2f3",
              "on-tertiary-fixed": "#022100",
              "on-tertiary": "#053900",
              "surface-tint": "#00dbe9",
              surface: "#0f131f",
              "outline-variant": "#3b494b",
              background: "#0f131f",
              "surface-container-lowest": "#0a0e1a",
              "error-container": "#93000a",
              "inverse-primary": "#006970",
              "on-tertiary-fixed-variant": "#095300",
              "surface-container": "#1b1f2c",
              "surface-container-highest": "#313442",
              "tertiary-fixed": "#79ff5b",
              "tertiary-container": "#33fb0a",
              "on-surface-variant": "#b9cacb",
              "on-secondary-container": "#725f00",
              "on-secondary": "#3a3000",
              "primary-fixed-dim": "#00dbe9",
              tertiary: "#e1ffd1",
              secondary: "#fff9ef",
              "on-primary-fixed": "#002022",
              "surface-container-low": "#171b28",
              "on-error": "#690005",
              "on-primary-fixed-variant": "#004f54",
              "primary-container": "#00f0ff",
              "surface-bright": "#353946",
              "on-tertiary-container": "#106e00",
              "on-secondary-fixed-variant": "#544600",
              "secondary-fixed-dim": "#e9c400",
              "inverse-surface": "#dfe2f3",
              "on-error-container": "#ffdad6",
              "secondary-container": "#ffdb3c",
              "on-primary": "#00363a",
              "surface-container-high": "#262a37",
              "on-secondary-fixed": "#221b00",
              "on-background": "#dfe2f3",
              "inverse-on-surface": "#2c303d",
              "primary-fixed": "#7df4ff",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "container-max": "1200px",
              "margin-desktop": "32px",
              "margin-mobile": "16px",
              gutter: "16px",
              unit: "4px",
            },
            fontFamily: {
              "headline-lg-mobile": ["Hanken Grotesk"],
              "headline-lg": ["Hanken Grotesk"],
              "stat-value": ["Geist"],
              "body-md": ["Hanken Grotesk"],
              "label-caps": ["Geist"],
              "body-lg": ["Hanken Grotesk"],
              "headline-md": ["Hanken Grotesk"],
            },
            fontSize: {
              "headline-lg-mobile": [
                "32px",
                {
                  lineHeight: "38px",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "headline-lg": [
                "40px",
                {
                  lineHeight: "48px",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "stat-value": ["20px", { lineHeight: "24px", fontWeight: "700" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.1em",
                  fontWeight: "600",
                },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>

    <!-- defer: script downloads in parallel but executes after HTML is parsed -->
    <script src="/script.js" defer></script>
  </head>

  <body
    class="text-on-surface font-body-md min-h-screen pb-12 overflow-x-hidden"
  >
    <!-- CRT scanline overlay — purely decorative, pointer-events disabled -->
    <div class="scanline-overlay"></div>

    <!-- Top navigation bar -->
    <header
      id="navigation-bar"
      class="bg-surface-dim dark:bg-surface-dim sticky top-0 z-50 border-b border-primary-container/20 shadow-[0_4px_12px_rgba(0,0,0,0.5)]"
    >
      <div
        class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-unit max-w-container-max mx-auto h-16"
      >
        <div class="flex items-center gap-3">
          <div class="p-1 border border-primary-container rounded">
            <a class="material-symbols-outlined text-primary-container" href="."
              >database</a
            >
          </div>
          <h1
            class="font-label-caps text-label-caps font-bold tracking-[0.2em] text-primary-container"
            style="display: none"
          >
            GLOBAL_INDEX
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="bg-primary/10 text-primary px-4 py-1 rounded border border-primary/30 font-label-caps text-[10px] tracking-widest hover:bg-primary/20 transition-all"
          >
            ADMIN_ACCESS
          </button>
        </div>
      </div>
    </header>

    <main class="px-margin-mobile pt-6 max-w-container-max mx-auto space-y-8">
      <!-- Search bar - human-edited -->
      <section class="w-full" aria-label="Country search">
        <h2
          id="project-title-default"
          class="project-title-default-position font-label-caps text-label-caps font-bold tracking-[2px] text-primary-container"
        >
          GLOBAL_INDEX
        </h2>
        <div
          id="search-bar"
          class="search-container rounded-lg p-1 group focus-within:border-primary-container transition-all shadow-[0_0_20px_rgba(0,240,255,0.1)]"
        >
          <div class="flex items-center bg-surface-container-lowest p-4 gap-4">
            <span
              class="material-symbols-outlined text-primary-container animate-pulse"
              >search</span
            >
            <input
              class="flex-1 bg-transparent border-none text-primary focus:ring-0 placeholder:text-outline/50 font-headline-md tracking-tight uppercase"
              placeholder="Search Country..."
              type="text"
              id="search-input"
              aria-label="Country name"
              spellcheck="false"
              autocomplete="off"
            />
            <div class="hidden md:flex gap-2">
              <span
                class="font-label-caps text-[10px] text-outline px-2 py-1 border border-outline/30 rounded"
                >ENTER</span
              >
            </div>
          </div>
          <div
            class="h-[2px] w-full bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50 group-focus-within:opacity-100"
          ></div>
        </div>
      </section>

      <!-- Search results — populated dynamically by script.js -->
      <div class="space-y-6" id="search-results" aria-live="polite"></div>
    </main>
  </body>
</html>
